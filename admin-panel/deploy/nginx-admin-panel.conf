# Конфиг для admin.receptly.ru — отдельная админ-панель.
# Положить как /etc/nginx/sites-available/admin-panel,
# затем: sudo ln -s /etc/nginx/sites-available/admin-panel /etc/nginx/sites-enabled/
# Получить SSL: sudo certbot --nginx -d admin.receptly.ru
#
# Перед получением сертификата нужна DNS A-запись:
# admin.receptly.ru -> 176.53.160.91

server {
    listen 80;
    listen [::]:80;
    server_name admin.receptly.ru;

    root /var/www/insales-integration/admin-panel/public;
    index index.php;

    # Базовая защита от сканеров до настройки HTTPS/Basic Auth.
    # После certbot --nginx этот блок будет автоматически продублирован под 443.

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # .env и прочие служебные файлы никогда не должны быть доступны напрямую
    location ~* \.(env|sql|md)$ {
        deny all;
    }

    access_log /var/log/nginx/admin-panel.access.log;
    error_log  /var/log/nginx/admin-panel.error.log;
}
